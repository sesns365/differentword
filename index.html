        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none; /* Safari */
            -khtml-user-select: none; /* Konqueror HTML */
            -moz-user-select: none; /* Old versions of Firefox */
            -ms-user-select: none; /* Internet Explorer/Edge */
            user-select: none; /* Non-prefixed version, currently supported by Chrome, Edge, Opera and Firefox */
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            transform: translate3d(0, 0, 0);
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out, outline 0.1s ease-in-out;
            font-weight: 700;
        }
        .card:hover {
            transform: scale(1.05);
        }
        #overlay {
            transition: opacity 0.3s ease-in-out;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .correct-answer-glow {
            animation: glow-green 1.5s infinite alternate;
        }
        @keyframes glow-green {
            from {
                outline: 4px solid #22c55e;
                box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
            }
            to {
                outline: 4px solid #86efac;
                box-shadow: 0 0 20px #22c55e, 0 0 30px #86efac;
            }
        }
        .original-position-glow {
             animation: glow-blue 1.5s infinite alternate;
        }
        @keyframes glow-blue {
            from {
                outline: 4px solid #3b82f6;
                box-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6;
            }
            to {
                outline: 4px solid #93c5fd;
                box-shadow: 0 0 20px #3b82f6, 0 0 30px #93c5fd;
            }
        }

                        "第一課": "遛逛繫陌俐醬咖啡倚貨築恨贈剌豔辣襯托彰購".split(''), "第二課": "疆港摒諺罐驢馱衰盜頤怖嘶啞嗓嚥爪梁喻惦初".split(''), "第三課": "踝絨號濺屈嫌埃縱攝氏逢倨嗤欠陋寡嗯".split(''), "第四課": "戎李劉彙晉軼撰遣辭栩唯濬致纍澀賅敘述".split(''), "第五課": "巷凰葵巔盎梭緯勺晶瑩攪拌剪裁鋁防鈴逝恆恬".split(''), "第六課": "輔仆傾窘貧兼職畢飢刊斤貸捍含歧抑濟績凌妨".split(''), "第七課": "驅衷迭滯崗謂秉俱誕旺鑰匙挫蔽域侷掘釐燃".split(''), "第八課": "駕拈豬蜘蛛詫啼抉苛塌稿湛鍛旨柢茁懵驟".split(''), "第九課": "雛膛芒啾拙懼凶漲鷗嘹滔襲陷阱".split('')
                    }
                }
            }
        };

        // --- Game State ---
        let CHARACTER_POOL = [];
        let originalCharacters = [];
        let changedCharacters = [];
        let changedIndex = -1;
        let replacedCharacter = '';
        let userClickedIndex = -1;
        let isShowingOriginal = false;
        let gameActive = false;
        let audioContext;
        let roundTimeoutId = null;
        let countdownIntervalId = null; // 新增：用於清除倒數計時器

        let totalQuestions = 0;
        let currentQuestionIndex = 0;
        let correctAnswersCount = 0;

        // --- Functions ---
        function initAudio() {
            if (audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) { console.error("Web Audio API is not supported."); }
        }
        
        function playSound(type) {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            } else if (type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.15);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            } else if (type === 'complete') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.7);
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
                oscillator.frequency.setValueAtTime(1046.50, audioContext.currentTime + 0.3); // C6
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.8);
            }
        }
        
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCard(char, index, itemCount) {
            const card = document.createElement('div');
            card.className = 'card bg-slate-200 rounded-lg flex items-center justify-center cursor-pointer shadow-sm';
            if (itemCount > 16) card.className += ' text-4xl md:text-5xl';
            else if (itemCount > 9) card.className += ' text-5xl md:text-6xl';
            else if (itemCount > 4) card.className += ' text-6xl md:text-7xl';
            else card.className += ' text-7xl md:text-8xl';
            card.dataset.index = index;
            card.textContent = char;
            return card;
        }

        function renderBoard(chars, isInteractive) {
            const itemCount = chars.length;
            const columns = Math.ceil(Math.sqrt(itemCount));
            gameBoard.innerHTML = '';
            gameBoard.className = `grid gap-2 md:gap-3 w-full h-full`;
            gameBoard.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
            chars.forEach((char, index) => {
                const card = createCard(char, index, itemCount);
                if (isInteractive) {
                    card.addEventListener('click', handleCardClick);
                } else {
                    card.classList.remove('cursor-pointer');
                    card.classList.add('cursor-wait');
                }
                gameBoard.appendChild(card);
            });
        }
        
        function confirmAndUpdateSettings() {
            const text = vocabInput.value;
            const rawChars = text.match(/\S/g) || [];
            const uniqueCharsCount = [...new Set(rawChars)].length;

            if (uniqueCharsCount < 2) {
                 alert(`請至少輸入 2 個不同的生字！`);
                 return;
            }

            const newMax = Math.min(uniqueCharsCount, 25);
            itemCountInput.max = newMax;
            itemCountInput.value = newMax; 
            
            settingsPanel.classList.remove('opacity-40');
            challengerNameInput.disabled = false;
            countdownInput.disabled = false;
            itemCountInput.disabled = false;
            totalQuestionsInput.disabled = false;
            startBtn.disabled = false;
            startBtn.classList.remove('cursor-not-allowed');

            vocabInput.disabled = true;
            confirmVocabBtn.disabled = true;
            confirmVocabBtn.classList.add('opacity-50');
            confirmVocabBtn.textContent = '已確認';
            resetVocabBtn.classList.remove('hidden');
        }

        function resetVocabInput() {
            vocabInput.disabled = false;
            confirmVocabBtn.disabled = false;
            confirmVocabBtn.classList.remove('opacity-50');
            confirmVocabBtn.textContent = '確認生字';
            resetVocabBtn.classList.add('hidden');
            settingsPanel.classList.add('opacity-40');
            challengerNameInput.disabled = true;
            countdownInput.disabled = true;
            itemCountInput.disabled = true;
            totalQuestionsInput.disabled = true;
            startBtn.disabled = true;
            startBtn.classList.add('cursor-not-allowed');
            vocabInput.focus();
        }

        function startQuiz() {
            const text = vocabInput.value;
            const rawChars = text.match(/\S/g) || [];
            CHARACTER_POOL = [...new Set(rawChars)];
            
            let itemCount = parseInt(itemCountInput.value, 10);
            if (CHARACTER_POOL.length < itemCount || CHARACTER_POOL.length < 2) {
                alert(`生字數量不足以開始測驗，請重新輸入。`);
                resetToInitialState();
                return;
            }
            
            initAudio();
            totalQuestions = parseInt(totalQuestionsInput.value, 10);
            if(isNaN(totalQuestions) || totalQuestions < 1) totalQuestions = 5;
            
            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            
            setupScreen.classList.add('hidden');
            resultsScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            nextQuestion();
        }

        function nextQuestion() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 終止目前的報讀
            }
            clearTimeout(roundTimeoutId);
            clearInterval(countdownIntervalId); // 新增：清除之前的倒數
            nextQuestionBtn.classList.add('hidden'); 
            viewToggleBtn.classList.add('hidden');
            abortBtn.classList.remove('hidden');

            if (currentQuestionIndex >= totalQuestions) {
                showResults();
                return;
            }
            currentQuestionIndex++;
            gameActive = true;
            changedIndex = -1;
            progressEl.textContent = `第 ${currentQuestionIndex} / ${totalQuestions} 題`;
            messageEl.classList.remove('text-red-500', 'text-green-500');


            let itemCount = parseInt(itemCountInput.value, 10);
            if (isNaN(itemCount) || itemCount < 2 || itemCount > 25) itemCount = 9;
            if (itemCount > CHARACTER_POOL.length) itemCount = CHARACTER_POOL.length;

            const shuffledChars = shuffle([...CHARACTER_POOL]);
            originalCharacters = shuffledChars.slice(0, itemCount);
            renderBoard(originalCharacters, false);
            
            // 新增：顯示倒數計時邏疑
            let timeLeft = parseInt(countdownInput.value, 10);
            messageEl.innerHTML = `請記住所有生字... <span class="text-blue-500 font-bold">(${timeLeft}秒)</span>`;
            
            countdownIntervalId = setInterval(() => {
                if (!gameActive) {
                    clearInterval(countdownIntervalId);
                    return;
                }
                timeLeft--;
                if (timeLeft > 0) {
                    messageEl.innerHTML = `請記住所有生字... <span class="text-blue-500 font-bold">(${timeLeft}秒)</span>`;
                } else {
                    clearInterval(countdownIntervalId);
                    prepareToChange();
                }
            }, 1000);
        }
        
        function prepareToChange() {
            if (!gameActive) return;
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            roundTimeoutId = setTimeout(() => {
                if (!gameActive) return;
                changeOneCharacter();
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }, 500); 
        }

        function changeOneCharacter() {
            messageEl.textContent = '哪一個生字改變了？';
            const currentChars = [...originalCharacters];
            changedIndex = Math.floor(Math.random() * currentChars.length);
            
            replacedCharacter = currentChars[changedIndex];

            const remainingChars = CHARACTER_POOL.filter(c => !originalCharacters.includes(c));
            const newChar = remainingChars.length > 0 
                ? remainingChars[Math.floor(Math.random() * remainingChars.length)]
                : CHARACTER_POOL.filter(c => c !== currentChars[changedIndex])[0];
            currentChars[changedIndex] = newChar;
            changedCharacters = [...currentChars];
            renderBoard(currentChars, true);
        }

        function handleCardClick(event) {
            if (changedIndex === -1) return;
            const clickedIndex = parseInt(event.currentTarget.dataset.index, 10);
            userClickedIndex = clickedIndex;
            const selectedCard = event.currentTarget;
            const clickedCharacter = selectedCard.textContent;
            
            gameBoard.childNodes.forEach(child => child.removeEventListener('click', handleCardClick));

            if (clickedIndex === changedIndex) {
                speakText(clickedCharacter);
                correctAnswersCount++;
                playSound('correct');
                messageEl.textContent = '答對了！';
                messageEl.classList.add('text-green-500');
                selectedCard.style.outline = '4px solid #22c55e'; 
                roundTimeoutId = setTimeout(nextQuestion, 1500);
            } else {
                playSound('error');
                gameBoard.classList.add('shake');
                
                const newChar = changedCharacters[changedIndex];
                const speechText = `答錯了！正確是${newChar}，原本是${replacedCharacter}`;
                speakText(speechText);
                
                messageEl.classList.remove('text-red-500', 'text-green-500');
                messageEl.innerHTML = `<span class="text-red-500">答錯了！</span> 正確是「${newChar}」<br class="sm:hidden">，原本是「${replacedCharacter}」`;

                gameBoard.addEventListener('animationend', () => gameBoard.classList.remove('shake'), { once: true });
                
                abortBtn.classList.add('hidden');
                nextQuestionBtn.classList.remove('hidden');
                viewToggleBtn.classList.remove('hidden');
                viewToggleBtn.textContent = '查看原圖';
                isShowingOriginal = false;
                
                // Show initial wrong state
                renderBoard(changedCharacters, false);
                gameBoard.children[userClickedIndex].style.outline = '4px solid #ef4444';
                gameBoard.children[changedIndex].classList.add('correct-answer-glow');
            }
            // Only reset changedIndex on correct answer. For wrong answers, it's needed by toggleView.
            if (clickedIndex === changedIndex) {
                 changedIndex = -1;
            }
        }

        function toggleView() {
            isShowingOriginal = !isShowingOriginal;
            if (isShowingOriginal) {
                viewToggleBtn.textContent = '查看變化圖';
                renderBoard(originalCharacters, false);
                gameBoard.children[changedIndex].classList.add('original-position-glow');
            } else {
                viewToggleBtn.textContent = '查看原圖';
                renderBoard(changedCharacters, false);
                gameBoard.children[userClickedIndex].style.outline = '4px solid #ef4444';
                gameBoard.children[changedIndex].classList.add('correct-answer-glow');
            }
        }

        function showResults() {
            playSound('complete'); // Play completion sound
            gameScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            const accuracy = totalQuestions > 0 ? (correctAnswersCount / totalQuestions) * 100 : 0;
            scoreEl.textContent = `${correctAnswersCount} / ${totalQuestions}`;
            accuracyEl.textContent = `${accuracy.toFixed(0)}%`;
        }

        function downloadResults() {
            const date = new Date().toLocaleString('zh-TW');
            const accuracy = totalQuestions > 0 ? (correctAnswersCount / totalQuestions) * 100 : 0;
            const challengerName = challengerNameInput.value.trim();
            const nameStr = challengerName ? `挑戰者：${challengerName}\n` : '';
            
            const textContent = `生字不一樣 - 測驗成績\n\n` +
                                nameStr +
                                `測驗時間：${date}\n` +
                                `顯示時間：${countdownInput.value} 秒\n` +
                                `顯示字數：${itemCountInput.value} 字\n` +
                                `測驗題數：${totalQuestions} 題\n` +
                                `----------------------\n` +
                                `答對題數：${correctAnswersCount} / ${totalQuestions}\n` +
                                `正確率：${accuracy.toFixed(0)}%\n` +
                                `----------------------\n` +
                                `測驗生字庫：\n${vocabInput.value}\n`;

            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // 產生包含時間的檔名
            const now = new Date();
            const timeStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
            a.download = `生字測驗成績_${timeStr}.txt`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function resetToInitialState() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 中斷遊戲時也終止報讀
            }
            clearTimeout(roundTimeoutId);
            clearInterval(countdownIntervalId); // 新增：中斷遊戲時清除倒數
            gameActive = false;
            resetVocabInput();
            vocabInput.value = '';
            challengerNameInput.value = ''; // 清空挑戰者名字
            resultsScreen.classList.add('hidden');
            gameScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        }
        
        // --- Dropdown Population ---
        function populateSelect(selectElement, options) {
            selectElement.innerHTML = '';
            options.forEach(optionText => {
                const option = document.createElement('option');
                option.value = optionText;
                option.textContent = optionText;
                selectElement.appendChild(option);
            });
        }

        function updateGradeSelect() {
            const selectedPublisher = publisherSelect.value;
            const grades = Object.keys(vocabData[selectedPublisher]);
            populateSelect(gradeSelect, grades);
            updateSemesterSelect();
        }

        function updateSemesterSelect() {
            const selectedPublisher = publisherSelect.value;
            const selectedGrade = gradeSelect.value;
            const semesters = Object.keys(vocabData[selectedPublisher][selectedGrade]);
            populateSelect(semesterSelect, semesters);
            updateLessonSelect();
        }

        function updateLessonSelect() {
            const selectedPublisher = publisherSelect.value;
            const selectedGrade = gradeSelect.value;
            const selectedSemester = semesterSelect.value;
            if (vocabData[selectedPublisher]?.[selectedGrade]?.[selectedSemester]) {
                const lessons = Object.keys(vocabData[selectedPublisher][selectedGrade][selectedSemester]);
                populateSelect(lessonSelect, lessons);
            } else {
                 populateSelect(lessonSelect, []);
            }
        }

        function loadSelectedLesson() {
            const publisher = publisherSelect.value;
            const grade = gradeSelect.value;
            const semester = semesterSelect.value;
            const lesson = lessonSelect.value;
            if (vocabData[publisher]?.[grade]?.[semester]?.[lesson]) {
                const words = vocabData[publisher][grade][semester][lesson];
                vocabInput.value = words.join(' ');

                const uniqueCharsCount = [...new Set(words)].length;
                const newMax = Math.min(uniqueCharsCount, 25);
                itemCountInput.max = newMax;
                itemCountInput.value = newMax;
            } else {
                vocabInput.value = '';
            }
        }

        // --- Event Listeners ---
        publisherSelect.addEventListener('change', updateGradeSelect);
        gradeSelect.addEventListener('change', updateSemesterSelect);
        semesterSelect.addEventListener('change', updateLessonSelect);
        loadLessonBtn.addEventListener('click', loadSelectedLesson);

        confirmVocabBtn.addEventListener('click', confirmAndUpdateSettings);
        resetVocabBtn.addEventListener('click', resetVocabInput);
        startBtn.addEventListener('click', startQuiz);
        restartBtn.addEventListener('click', resetToInitialState);
        abortBtn.addEventListener('click', resetToInitialState);
        nextQuestionBtn.addEventListener('click', nextQuestion);
        viewToggleBtn.addEventListener('click', toggleView);
        downloadBtn.addEventListener('click', downloadResults);

        itemCountInput.addEventListener('input', () => {
            const max = parseInt(itemCountInput.max);
            const value = parseInt(itemCountInput.value);
            if (!isNaN(value) && !isNaN(max) && value > max) {
                itemCountInput.value = max;
            }
        });
        
        // --- Initial Setup ---
        populateSelect(publisherSelect, Object.keys(vocabData));
        updateGradeSelect();

    </script>
</body>
</html>
